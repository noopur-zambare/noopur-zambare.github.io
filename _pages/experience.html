---
layout: archive
title: "Experience"
permalink: /experience/
author_profile: true
---

{% include base_path %}

{% assign sorted_experience = site.experience | sort: "date" | reverse %}

{% for post in sorted_experience %}

<article style="margin-bottom: 14px;">

  <h2 style="margin-bottom: 2px;">
    {{ post.title }}
  </h2>

  <div style="margin-bottom: 4px; line-height: 1.45;">
    {{ post.excerpt }}
  </div>

</article>

<hr style="
  border: 0;
  border-top: 1px solid #eee;
  margin: 6px 0;
">

{% endfor %}
