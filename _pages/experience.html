{% include base_path %}

{% assign sorted_experience = site.experience | sort: "date" | reverse %}

<div class="page__content">

{% for post in sorted_experience %}

  <div style="margin-bottom: 12px;">

    <h2 style="margin: 0 0 3px 0;">
      {{ post.title }}
    </h2>

    <div style="margin: 0;">
      {{ post.excerpt }}
    </div>

  </div>

{% endfor %}

</div>
