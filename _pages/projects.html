<script>
function openFullscreen(btn) {
  const media = btn.parentElement.querySelector("img, video");
  const src = media.tagName === "VIDEO" ? media.querySelector("source").src : media.src;
  const type = media.tagName.toLowerCase();

  const modal = document.createElement("div");
  modal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  `;

  let content;

  if (type === "video") {
    content = document.createElement("video");
    content.src = src;
    content.controls = true;
    content.autoplay = true;
  } else {
    content = document.createElement("img");
    content.src = src;
  }

  content.style.cssText = `
    max-width: 95vw;
    max-height: 95vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 10px;
  `;

  modal.appendChild(content);
  document.body.appendChild(modal);

  modal.onclick = () => modal.remove();
}
</script>
